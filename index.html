<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Norwegian Reggaeton</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; overflow:hidden; font-family:'Arial Black',Arial,sans-serif; user-select:none; }
#canvas { display:block; margin:0 auto; }
#ui { position:fixed; top:0; left:0; width:100%; pointer-events:none; }
#muteBtn {
  position:fixed; top:12px; right:12px;
  background:rgba(0,0,0,.7); color:#fff;
  border:2px solid #fff; border-radius:8px;
  padding:6px 14px; font-size:18px; cursor:pointer;
  pointer-events:all; z-index:100;
}
#touchControls {
  position:fixed; bottom:0; left:0; width:100%;
  display:none; justify-content:center; align-items:center;
  padding-bottom:10px; gap:0; z-index:50; pointer-events:all;
}
.tBtn {
  width:80px; height:80px; border-radius:50%;
  border:3px solid rgba(255,255,255,.5);
  background:rgba(255,255,255,.15);
  font-size:32px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; margin:5px;
  -webkit-tap-highlight-color:transparent;
}
@media (max-width:700px) { #touchControls { display:flex; flex-wrap:wrap; } }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<button id="muteBtn">🔊</button>
<div id="touchControls">
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div class="tBtn" id="tUp">▲</div>
    <div style="display:flex;">
      <div class="tBtn" id="tLeft">◄</div>
      <div class="tBtn" id="tDown">▼</div>
      <div class="tBtn" id="tRight">►</div>
    </div>
  </div>
</div>
<script>
// ─────────────────────────────────────────────
// CANVAS SETUP
// ─────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
function resize(){
  const s = Math.min(window.innerWidth, window.innerHeight*0.98, 520);
  canvas.width = 480; canvas.height = 720;
  canvas.style.width = s+'px';
  canvas.style.height = (s/480*720)+'px';
}
resize(); window.addEventListener('resize', resize);

// ─────────────────────────────────────────────
// AUDIO ENGINE
// ─────────────────────────────────────────────
let audioCtx = null, muted = false, bgmNodes = [];
function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}
document.getElementById('muteBtn').addEventListener('click',()=>{
  muted=!muted;
  document.getElementById('muteBtn').textContent = muted?'🔇':'🔊';
  if(muted) bgmNodes.forEach(n=>{try{n.gain.setTargetAtTime(0,audioCtx.currentTime,.05);}catch(e){}});
  else bgmNodes.forEach(n=>{try{n.gain.setTargetAtTime(.18,audioCtx.currentTime,.05);}catch(e){}});
});

function beep(freq,dur,type='square',vol=0.18,detune=0){
  if(!audioCtx||muted) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type=type; o.frequency.value=freq; o.detune.value=detune;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.start(); o.stop(audioCtx.currentTime+dur);
}

function playSfx(type){
  if(!audioCtx||muted) return;
  if(type==='perfect'){ beep(880,.08,'square',.22); setTimeout(()=>beep(1320,.12,'square',.18),60); }
  if(type==='good'){    beep(660,.1,'square',.15); }
  if(type==='miss'){    beep(150,.25,'sawtooth',.2); beep(100,.3,'sawtooth',.15,100); }
  if(type==='life'){    beep(200,.15,'sawtooth',.25); setTimeout(()=>beep(150,.2,'sawtooth',.25),100); setTimeout(()=>beep(100,.3,'sawtooth',.3),200); }
  if(type==='combo'){   [440,550,660,880].forEach((f,i)=>setTimeout(()=>beep(f,.1,'square',.2),i*60)); }
  if(type==='gameover'){ [300,250,200,150].forEach((f,i)=>setTimeout(()=>beep(f,.18,'sawtooth',.25),i*120)); }
  if(type==='win'){     [440,550,660,770,880].forEach((f,i)=>setTimeout(()=>beep(f,.1,'square',.22),i*70)); }
}

// BGM: reggaeton 8-bit
function startBGM(level){
  stopBGM();
  if(!audioCtx||muted) return;
  const bpm = 95 + level*8;
  const beat = 60/bpm;
  // Bass pattern
  const bassNotes = [65,65,73,65, 65,65,73,78];
  const melNotes  = [196,247,294,247, 220,262,294,330];
  let bi=0,mi=0,ti=0;
  function schedBass(){
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type='sawtooth'; o.frequency.value=bassNotes[bi%bassNotes.length];
    g.gain.setValueAtTime(.12,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+beat*.45);
    o.start(); o.stop(audioCtx.currentTime+beat*.45);
    bgmNodes.push(g); bi++;
    if(!stopped) bgmTimer1=setTimeout(schedBass, beat*500);
  }
  function schedMel(){
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type='square'; o.frequency.value=melNotes[mi%melNotes.length];
    g.gain.setValueAtTime(.07,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+beat*.4);
    o.start(); o.stop(audioCtx.currentTime+beat*.4);
    bgmNodes.push(g); mi++;
    if(!stopped) bgmTimer2=setTimeout(schedMel, beat*250);
  }
  function schedHat(){
    if(!audioCtx) return;
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.05,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*.5;
    const src=audioCtx.createBufferSource(), g=audioCtx.createGain();
    src.buffer=buf; src.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(.08,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.05);
    src.start(); bgmNodes.push(g); ti++;
    if(!stopped) bgmTimer3=setTimeout(schedHat, beat*250*(ti%2===0?.5:1));
  }
  let stopped=false, bgmTimer1,bgmTimer2,bgmTimer3;
  schedBass(); schedMel(); schedHat();
  window._stopBGMFn = ()=>{ stopped=true; clearTimeout(bgmTimer1); clearTimeout(bgmTimer2); clearTimeout(bgmTimer3); };
}
function stopBGM(){
  if(window._stopBGMFn){ window._stopBGMFn(); window._stopBGMFn=null; }
  bgmNodes=[];
}

// ─────────────────────────────────────────────
// GAME CONSTANTS
// ─────────────────────────────────────────────
const W=480, H=720;
const DIRS = ['left','down','up','right'];
const DIR_IDX = {left:0, down:1, up:2, right:3};
const COL_X = {left:96, down:192, up:288, right:384};
const ARROW_Y_HIT = 620; // hit zone center Y
const HIT_WINDOW_PERFECT = 32;
const HIT_WINDOW_GOOD    = 58;

const COLORS = {
  left:  '#ff3399',
  down:  '#00ffcc',
  up:    '#ffff00',
  right: '#00aaff'
};

const LEVEL_CONFIG = [
  { speed:180, bpm:95,  maxDouble:0, maxTriple:0, arrowsTotal:20, minGap:1.4 },
  { speed:230, bpm:103, maxDouble:0, maxTriple:0, arrowsTotal:28, minGap:1.2 },
  { speed:290, bpm:111, maxDouble:1, maxTriple:0, arrowsTotal:36, minGap:1.0 },
  { speed:360, bpm:119, maxDouble:2, maxTriple:0, arrowsTotal:44, minGap:.85 },
  { speed:440, bpm:127, maxDouble:2, maxTriple:3, arrowsTotal:54, minGap:.7  },
];

// ─────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────
let state = 'title'; // title | playing | levelwin | gameover | victory
let level = 0;
let lives = 3;
let score = 0;
let combo = 0;
let maxCombo = 0;
let arrows = [];
let feedback = [];
let bgTimer = 0;
let bgPhase = 0; // 0=norwegian 1=tropical
let vikingAnim = {move:'idle', timer:0};
let comboAnim = 0;
let levelArrows = [];
let arrowSpawnIdx = 0;
let lastTime = 0;
let particles = [];
let bubbleMsg = null; // {text, timer, big}
let pressedKeys = {};

// ─────────────────────────────────────────────
// ARROW GENERATION
// ─────────────────────────────────────────────
function genLevelArrows(lvl){
  const cfg = LEVEL_CONFIG[lvl];
  const list = [];
  let t = 1.5;
  const totalNeeded = cfg.arrowsTotal;
  let count = 0;
  while(count < totalNeeded){
    const shuffle = DIRS.slice().sort(()=>Math.random()-.5);
    const d = shuffle[0];
    list.push({dir:d, spawnTime:t, spawned:false, hit:false, missed:false});
    count++;
    // double/triple simultaneous
    if(lvl >= 3 && count < totalNeeded && Math.random()<.3){
      const d2 = DIRS.filter(x=>x!==d)[Math.floor(Math.random()*3)];
      list.push({dir:d2, spawnTime:t, spawned:false, hit:false, missed:false});
      count++;
      if(lvl >= 4 && count < totalNeeded && Math.random()<.25){
        const remaining = DIRS.filter(x=>x!==d&&x!==d2);
        const d3 = remaining[Math.floor(Math.random()*remaining.length)];
        list.push({dir:d3, spawnTime:t, spawned:false, hit:false, missed:false});
        count++;
      }
    }
    t += cfg.minGap + Math.random()*.4;
  }
  return list.sort((a,b)=>a.spawnTime-b.spawnTime);
}

// ─────────────────────────────────────────────
// VIKING DRAWING
// ─────────────────────────────────────────────
function drawViking(x, y, move, timer){
  ctx.save();
  ctx.translate(x, y);
  const t = timer;
  let bx=0, by=0, headTilt=0, lArmAngle=-.5, rArmAngle=.5, lLegAngle=.2, rLegAngle=-.2;
  let bodyScale=1, bounce=0;

  // Reggaeton moves
  if(move==='left'){
    bx=-8; headTilt=-.2; lArmAngle=-1.2; rArmAngle=1.4;
    lLegAngle=.5; rLegAngle=-.1; bounce=Math.sin(t*8)*4;
  } else if(move==='right'){
    bx=8; headTilt=.2; lArmAngle=-1.4; rArmAngle=1.2;
    lLegAngle=.1; rLegAngle=-.5; bounce=Math.sin(t*8)*4;
  } else if(move==='up'){
    by=-10; lArmAngle=-2.0; rArmAngle=2.0;
    lLegAngle=.4; rLegAngle=.4; bounce=5;
    bodyScale=1.05;
  } else if(move==='down'){
    by=8; lArmAngle=-.2; rArmAngle=.2;
    lLegAngle=-.2; rLegAngle=.2; bounce=-3;
    ctx.scale(1.1,.9);
  } else if(move==='combo'){
    bx=Math.sin(t*6)*10; bounce=Math.abs(Math.sin(t*8))*8;
    lArmAngle=-2.4+Math.sin(t*5)*.3; rArmAngle=2.4-Math.sin(t*5)*.3;
    lLegAngle=Math.sin(t*6)*.6; rLegAngle=-Math.sin(t*6)*.6;
    headTilt=Math.sin(t*4)*.25; bodyScale=1+Math.sin(t*8)*.05;
  } else if(move==='fail_trip'){
    bx=12; by=10; headTilt=.8;
    lArmAngle=-2.5; rArmAngle=2.5; lLegAngle=1.2; rLegAngle=-.8;
  } else if(move==='fail_fall'){
    bx=0; by=14; ctx.rotate(.5);
    lArmAngle=-1.8; rArmAngle=1.8; lLegAngle=1.5; rLegAngle=1.0;
  } else if(move==='fail_axe'){
    bx=-5; by=-5; headTilt=-.3;
    lArmAngle=-2.8; rArmAngle=.3; lLegAngle=.3; rLegAngle=-.1;
  } else {
    // idle bounce
    bounce=Math.sin(t*3)*2;
    lArmAngle=-.3+Math.sin(t*2)*.1; rArmAngle=.3-Math.sin(t*2)*.1;
    lLegAngle=.1; rLegAngle=-.1;
  }

  ctx.translate(bx, by+bounce);
  ctx.scale(bodyScale,bodyScale);

  // LEGS
  drawLimb(ctx, -10, 20, 0, lLegAngle, 32, 10, '#8B4513', '#6B3410');
  drawLimb(ctx, 10, 20, 0, rLegAngle, 32, 10, '#8B4513', '#6B3410');
  // Boots
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.ellipse(-10+Math.sin(lLegAngle)*32, 20+Math.cos(lLegAngle)*32-5, 12, 8, lLegAngle, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(10+Math.sin(rLegAngle)*32, 20+Math.cos(rLegAngle)*32-5, 12, 8, rLegAngle, 0, Math.PI*2); ctx.fill();

  // BODY (tunic)
  ctx.fillStyle='#4a90d9'; // blue tunic
  ctx.beginPath(); ctx.roundRect(-20, -10, 40, 32, 8); ctx.fill();
  ctx.fillStyle='#3070b9';
  ctx.fillRect(-20, 5, 40, 5); // belt line
  ctx.fillStyle='#c8a000';
  ctx.fillRect(-20, 5, 40, 4); // belt

  // ARMS
  drawLimb(ctx, -22, -8, Math.PI+.3, lArmAngle, 28, 8, '#f5c88a', '#d4a870');
  drawLimb(ctx, 22, -8, Math.PI-.3, rArmAngle, 28, 8, '#f5c88a', '#d4a870');
  // Axe on right arm (fail_axe shows it hits head)
  if(move==='fail_axe'){
    ctx.save(); ctx.translate(22+Math.sin(rArmAngle)*28, -8+Math.cos(rArmAngle)*28-15);
    ctx.rotate(rArmAngle+Math.PI*.6);
    ctx.fillStyle='#aaa'; ctx.fillRect(-3,-18,6,20);
    ctx.fillStyle='#888';
    ctx.beginPath(); ctx.moveTo(5,-18); ctx.lineTo(16,-10); ctx.lineTo(5,-2); ctx.fill();
    ctx.restore();
  }

  // HEAD
  ctx.save(); ctx.translate(0, -20+headTilt*5); ctx.rotate(headTilt);
  // Face
  ctx.fillStyle='#f5c88a';
  ctx.beginPath(); ctx.ellipse(0, 0, 22, 24, 0, 0, Math.PI*2); ctx.fill();
  // Beard
  ctx.fillStyle='#e8c060';
  ctx.beginPath(); ctx.ellipse(0, 16, 16, 10, 0, 0, Math.PI); ctx.fill();
  ctx.fillStyle='#d4a800';
  for(let i=-2;i<=2;i++){
    ctx.beginPath(); ctx.moveTo(i*5, 16); ctx.lineTo(i*5-3, 28); ctx.lineWidth=3; ctx.strokeStyle='#d4a800'; ctx.stroke();
  }
  // Braids
  ctx.strokeStyle='#e8c060'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(-18,2); ctx.quadraticCurveTo(-28,20,-20,32); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(18,2); ctx.quadraticCurveTo(28,20,20,32); ctx.stroke();
  // Braid beads
  ctx.fillStyle='#c00';
  ctx.beginPath(); ctx.ellipse(-21,28,4,5,-.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(21,28,4,5,.3,0,Math.PI*2); ctx.fill();

  // Eyes
  const eyeOff = move==='fail_trip'||move==='fail_fall'||move==='fail_axe';
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(-9,-4,6,7,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(9,-4,6,7,0,0,Math.PI*2); ctx.fill();
  if(eyeOff){
    // X eyes
    ctx.strokeStyle='#333'; ctx.lineWidth=2;
    [[-9,-4],[9,-4]].forEach(([ex,ey])=>{
      ctx.beginPath(); ctx.moveTo(ex-4,ey-4); ctx.lineTo(ex+4,ey+4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ex+4,ey-4); ctx.lineTo(ex-4,ey+4); ctx.stroke();
    });
  } else {
    ctx.fillStyle='#333';
    ctx.beginPath(); ctx.ellipse(-9,-4,3,4,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(9,-4,3,4,0,0,Math.PI*2); ctx.fill();
    // Shine
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(-8,-5,1,1.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(10,-5,1,1.5,0,0,Math.PI*2); ctx.fill();
  }
  // Mouth
  if(eyeOff){
    ctx.strokeStyle='#a00'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,8,6,0,Math.PI,true); ctx.stroke();
  } else if(move==='combo'){
    ctx.fillStyle='#a00';
    ctx.beginPath(); ctx.arc(0,8,7,0,Math.PI); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 10px Arial'; ctx.textAlign='center';
    ctx.fillText('♪',0,14);
  } else {
    ctx.strokeStyle='#a00'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(0,8,6,0,Math.PI); ctx.stroke();
  }
  // Nose
  ctx.fillStyle='#e0a870';
  ctx.beginPath(); ctx.ellipse(0,2,4,3,0,0,Math.PI*2); ctx.fill();

  // HELMET
  ctx.fillStyle='#aaa';
  ctx.beginPath(); ctx.ellipse(0,-12,24,16,0,Math.PI,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ccc';
  ctx.beginPath(); ctx.rect(-26,-12,52,5); ctx.fill();
  // Horns
  ctx.fillStyle='#fff8e0';
  ctx.beginPath(); ctx.moveTo(-22,-12); ctx.quadraticCurveTo(-40,-28,-30,-38); ctx.quadraticCurveTo(-22,-28,-22,-12); ctx.fill();
  ctx.strokeStyle='#ddd'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-28,-18); ctx.quadraticCurveTo(-36,-30,-28,-36); ctx.stroke();
  ctx.fillStyle='#fff8e0';
  ctx.beginPath(); ctx.moveTo(22,-12); ctx.quadraticCurveTo(40,-28,30,-38); ctx.quadraticCurveTo(22,-28,22,-12); ctx.fill();
  ctx.beginPath(); ctx.moveTo(28,-18); ctx.quadraticCurveTo(36,-30,28,-36); ctx.stroke();
  ctx.restore(); // head

  ctx.restore(); // viking
}

function drawLimb(ctx, x, y, baseAngle, angle, len, w, col, col2){
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(baseAngle + angle);
  const grad = ctx.createLinearGradient(-w/2,0,w/2,0);
  grad.addColorStop(0,col2); grad.addColorStop(.5,col); grad.addColorStop(1,col2);
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.roundRect(-w/2, 0, w, len, w/2); ctx.fill();
  ctx.restore();
}

// ─────────────────────────────────────────────
// ARROW DRAWING
// ─────────────────────────────────────────────
function drawArrow(x, y, dir, color, alpha=1, scale=1, ghost=false){
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  const angles = {left:Math.PI, down:Math.PI/2, up:-Math.PI/2, right:0};
  ctx.rotate(angles[dir]||0);
  ctx.scale(scale,scale);

  if(ghost){
    ctx.strokeStyle=color; ctx.lineWidth=3; ctx.globalAlpha=alpha*.4;
    ctx.beginPath();
    ctx.moveTo(22,0); ctx.lineTo(-10,16); ctx.lineTo(-6,0); ctx.lineTo(-22,0);
    ctx.lineTo(-22,-0); ctx.lineTo(-6,-0); ctx.lineTo(-10,-16); ctx.closePath();
    ctx.stroke();
  } else {
    // Shadow
    ctx.shadowColor=color; ctx.shadowBlur=12;
    // Outline
    ctx.fillStyle='#000';
    ctx.beginPath();
    ctx.moveTo(24,0); ctx.lineTo(-8,18); ctx.lineTo(-4,0); ctx.lineTo(-24,0);
    ctx.lineTo(-24,-0); ctx.lineTo(-4,-0); ctx.lineTo(-8,-18); ctx.closePath();
    ctx.scale(1.12,1.12); ctx.fill(); ctx.setTransform(1,0,0,1,0,0);
    ctx.translate(x,y); ctx.rotate(angles[dir]||0); ctx.scale(scale,scale);
    // Fill
    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.moveTo(22,0); ctx.lineTo(-8,16); ctx.lineTo(-4,0); ctx.lineTo(-22,0);
    ctx.lineTo(-22,-0); ctx.lineTo(-4,-0); ctx.lineTo(-8,-16); ctx.closePath();
    ctx.fill();
    // Sheen
    ctx.fillStyle='rgba(255,255,255,.35)';
    ctx.beginPath();
    ctx.moveTo(18,-2); ctx.lineTo(-6,-2); ctx.lineTo(-4,-10); ctx.lineTo(-8,-14); ctx.lineTo(14,-5); ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
// BACKGROUNDS
// ─────────────────────────────────────────────
function drawNorwegian(alpha){
  ctx.save(); ctx.globalAlpha=alpha;
  // Sky gradient
  const sky=ctx.createLinearGradient(0,0,0,H*.55);
  sky.addColorStop(0,'#1a2a4a'); sky.addColorStop(1,'#3a6a8a');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*.55);
  // Aurora
  for(let i=0;i<3;i++){
    const ag=ctx.createLinearGradient(0,60+i*30,0,110+i*30);
    ag.addColorStop(0,'rgba(0,255,120,0)');
    ag.addColorStop(.5,`rgba(${[0,100,200][i]},255,${[150,200,100][i]},.25)`);
    ag.addColorStop(1,'rgba(0,255,120,0)');
    ctx.fillStyle=ag;
    ctx.beginPath();
    ctx.moveTo(0,70+i*25);
    for(let x=0;x<=W;x+=40) ctx.quadraticCurveTo(x+20,50+i*25+Math.sin(x*.04+bgTimer*.5+i)*20,x+40,70+i*25+Math.sin(x*.04+bgTimer*.5+i)*15);
    ctx.lineTo(W,120+i*30); ctx.lineTo(0,120+i*30); ctx.closePath();
    ctx.fill();
  }
  // Mountains
  ctx.fillStyle='#2a3a5a';
  ctx.beginPath(); ctx.moveTo(0,H*.55);
  ctx.lineTo(0,260); ctx.lineTo(60,180); ctx.lineTo(130,240); ctx.lineTo(200,150);
  ctx.lineTo(270,220); ctx.lineTo(360,140); ctx.lineTo(440,200); ctx.lineTo(480,160); ctx.lineTo(480,H*.55);
  ctx.fill();
  // Snow caps
  ctx.fillStyle='#eef5ff';
  [[60,180,30],[200,150,28],[360,140,32],[480,160,22]].forEach(([px,py,r])=>{
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px-r,py+r*.8); ctx.lineTo(px+r,py+r*.8); ctx.closePath(); ctx.fill();
  });
  // Fjord
  const fw=ctx.createLinearGradient(0,H*.45,0,H*.6);
  fw.addColorStop(0,'#1a4a6a'); fw.addColorStop(1,'#0d2a3a');
  ctx.fillStyle=fw; ctx.fillRect(0,H*.45,W,H*.15);
  // Snow ground
  ctx.fillStyle='#ddeeff';
  ctx.beginPath(); ctx.moveTo(0,H*.58); ctx.quadraticCurveTo(W*.25,H*.55,W*.5,H*.58); ctx.quadraticCurveTo(W*.75,H*.61,W,H*.58); ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.fill();
  // Snowflakes
  ctx.fillStyle='rgba(255,255,255,.7)';
  for(let i=0;i<20;i++){
    const sx=(i*73+bgTimer*8)%W, sy=(i*47+bgTimer*5)%((H*.55));
    ctx.beginPath(); ctx.arc(sx,sy,1.5,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawTropical(alpha){
  ctx.save(); ctx.globalAlpha=alpha;
  // Sky
  const sky=ctx.createLinearGradient(0,0,0,H*.55);
  sky.addColorStop(0,'#ff6a00'); sky.addColorStop(.4,'#ffb347'); sky.addColorStop(1,'#87ceeb');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*.55);
  // Sun
  ctx.fillStyle='#ffe066';
  ctx.shadowColor='#ffaa00'; ctx.shadowBlur=30;
  ctx.beginPath(); ctx.arc(380,80,40,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  // Clouds
  ctx.fillStyle='rgba(255,255,255,.85)';
  [[80,60,60,25],[220,45,80,20],[330,55,50,18]].forEach(([cx,cy,w,h])=>{
    ctx.beginPath(); ctx.ellipse(cx,cy,w,h,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+w*.3,cy-h*.4,w*.6,h*.8,0,0,Math.PI*2); ctx.fill();
  });
  // Sea
  const sw=ctx.createLinearGradient(0,H*.42,0,H*.62);
  sw.addColorStop(0,'#00aaff'); sw.addColorStop(1,'#0055aa');
  ctx.fillStyle=sw; ctx.fillRect(0,H*.42,W,H*.2);
  // Waves
  ctx.strokeStyle='rgba(255,255,255,.4)'; ctx.lineWidth=2;
  for(let i=0;i<4;i++){
    ctx.beginPath();
    for(let x=0;x<=W;x+=20) ctx.lineTo(x,H*.48+i*12+Math.sin(x*.07+bgTimer*.8+i)*4);
    ctx.stroke();
  }
  // Sand
  ctx.fillStyle='#f5dfa0';
  ctx.beginPath(); ctx.moveTo(0,H*.57); ctx.quadraticCurveTo(W*.5,H*.54,W,H*.57); ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.fill();
  // Palm trees
  [[50,H*.58],[430,H*.56]].forEach(([tx,ty])=>{
    ctx.strokeStyle='#8B6914'; ctx.lineWidth=8;
    ctx.beginPath(); ctx.moveTo(tx,ty+20); ctx.quadraticCurveTo(tx+10,ty-50,tx+5,ty-80); ctx.stroke();
    ctx.fillStyle='#228B22';
    for(let a=0;a<5;a++){
      const ang=a/5*Math.PI*2+bgTimer*.3;
      ctx.beginPath();
      ctx.moveTo(tx+5,ty-80);
      ctx.quadraticCurveTo(tx+5+Math.cos(ang)*40,ty-80+Math.sin(ang)*20, tx+5+Math.cos(ang)*60,ty-70+Math.sin(ang)*30);
      ctx.lineWidth=5; ctx.strokeStyle='#228B22'; ctx.stroke();
    }
    // Coconuts
    ctx.fillStyle='#8B4513';
    ctx.beginPath(); ctx.arc(tx+8,ty-76,6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(tx,ty-80,5,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

function drawBackground(dt){
  bgTimer += dt;
  // Phase switches every 8s
  const phaseLen=8, cycle=bgTimer%(phaseLen*2);
  const blend = cycle<phaseLen ? cycle/phaseLen : 1-(cycle-phaseLen)/phaseLen;
  drawNorwegian(1-blend);
  drawTropical(blend);
  // Floor/stage area
  ctx.fillStyle='rgba(0,0,0,.55)';
  ctx.fillRect(0, H*.58, W, H*.42);
  // Stage glow line
  ctx.strokeStyle='#ff00ff'; ctx.lineWidth=2;
  ctx.shadowColor='#ff00ff'; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.moveTo(0,H*.58); ctx.lineTo(W,H*.58); ctx.stroke();
  ctx.shadowBlur=0;
}

// ─────────────────────────────────────────────
// PARTICLES
// ─────────────────────────────────────────────
function spawnParticles(x, y, color, n=8){
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2, spd=60+Math.random()*120;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-60,
      color,alpha:1,life:0,maxLife:.5+Math.random()*.3,r:4+Math.random()*4});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life+=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=200*dt;
    p.alpha=1-p.life/p.maxLife;
    if(p.life>=p.maxLife) particles.splice(i,1);
  }
}
function drawParticles(){
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.alpha;
    ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// ─────────────────────────────────────────────
// FEEDBACK TEXT
// ─────────────────────────────────────────────
function spawnFeedback(text, x, y, color){
  feedback.push({text,x,y,color,life:0,maxLife:.9,vy:-60});
}
function updateFeedback(dt){
  for(let i=feedback.length-1;i>=0;i--){
    const f=feedback[i]; f.life+=dt; f.y+=f.vy*dt; f.vy*=0.92;
    if(f.life>=f.maxLife) feedback.splice(i,1);
  }
}
function drawFeedback(){
  feedback.forEach(f=>{
    const a=1-f.life/f.maxLife;
    ctx.save(); ctx.globalAlpha=a;
    ctx.font='bold 28px "Arial Black",Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.strokeStyle='#000'; ctx.lineWidth=4;
    ctx.strokeText(f.text,f.x,f.y);
    ctx.fillStyle=f.color; ctx.fillText(f.text,f.x,f.y);
    ctx.restore();
  });
}

function showBubble(text, duration=3.5, big=false){

}
function drawBubble(){
  if(!bubbleMsg) return;
  const lines=bubbleMsg.text.split('\n');
  const big=bubbleMsg.big;
  const fs=big?20:16;
  ctx.font=`bold ${fs}px "Arial Black",Arial`;
  const maxW=Math.max(...lines.map(l=>ctx.measureText(l).width));
  const pw=maxW+40, ph=lines.length*fs*1.4+28;
  const bx=W/2-pw/2, by=H*.32-ph/2;
  // Bubble bg
  ctx.save();
  ctx.fillStyle='#fff';
  ctx.strokeStyle='#333'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.roundRect(bx,by,pw,ph,16); ctx.fill(); ctx.stroke();
  // Tail
  ctx.beginPath();
  ctx.moveTo(W/2-15,by+ph); ctx.lineTo(W/2+15,by+ph); ctx.lineTo(W/2,by+ph+20); ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Text
  ctx.fillStyle='#111'; ctx.textAlign='center'; ctx.textBaseline='middle';
  lines.forEach((line,i)=>{
    ctx.font=`bold ${fs}px "Arial Black",Arial`;
    ctx.fillText(line, W/2, by+20+(i+.5)*fs*1.4);
  });
  ctx.restore();
}

// ─────────────────────────────────────────────
// GAME LOGIC
// ─────────────────────────────────────────────
let gameTime = 0;

function startLevel(lvl){
  level=lvl; lives=3; combo=0; arrows=[];
  feedback=[]; particles=[]; bubbleMsg=null;
  levelArrows=genLevelArrows(lvl);
  arrowSpawnIdx=0; gameTime=0;
  vikingAnim={move:'idle',timer:0};
  startBGM(lvl);
  state='playing';
}

function gameOver(){
  stopBGM(); playSfx('gameover');
  state='gameover';
}

function levelWin(){
  stopBGM(); playSfx('win');
  if(level>=4){ state='victory'; }
  else { state='levelwin'; }
}

function pressDir(dir){
  if(state!=='playing') return;
  pressedKeys[dir+'_flash']=.3;

  // Find nearest arrow in hit window for this dir
  let best=null, bestDist=999;
  arrows.forEach(a=>{
    if(a.dir!==dir||a.hit||a.missed) return;
    const dist=Math.abs(a.y-ARROW_Y_HIT);
    if(dist<bestDist){ bestDist=dist; best=a; }
  });

  if(!best || bestDist>HIT_WINDOW_GOOD){
    // Miss press (early/late)
    vikingAnim={move:['fail_trip','fail_fall','fail_axe'][Math.floor(Math.random()*3)],timer:0.55};
    combo=0; playSfx('miss');
    spawnFeedback('MANCATO!', W/2, ARROW_Y_HIT-30, '#ff3333');
    return;
  }
  best.hit=true;
  const perfect=bestDist<=HIT_WINDOW_PERFECT;
  const pts=perfect?100:50;
  score+=pts*(1+Math.floor(combo/5));
  combo++;
  if(combo>maxCombo) maxCombo=combo;

  spawnParticles(COL_X[dir],ARROW_Y_HIT,COLORS[dir],perfect?14:8);

  if(perfect){
    playSfx('perfect');
    spawnFeedback('PERFETTO!', W/2, ARROW_Y_HIT-50, '#ffff00');
    vikingAnim={move:combo>=8?'combo':dir,timer:0.5};
    if(combo>=8){ comboAnim=0.6; playSfx('combo'); showBubble('COMBO EPICA!\n'+combo+' di fila! 🔥'); }
  } else {
    playSfx('good');
    spawnFeedback('BUONO!', W/2, ARROW_Y_HIT-40, '#00ffcc');
    vikingAnim={move:dir,timer:0.4};
  }
}

function updateGame(dt){
  if(state!=='playing') return;
  gameTime+=dt;

  // Decay flash
  DIRS.forEach(d=>{
    if(pressedKeys[d+'_flash']>0) pressedKeys[d+'_flash']-=dt*2;
  });

  // Spawn arrows
  const cfg=LEVEL_CONFIG[level];
  while(arrowSpawnIdx<levelArrows.length && levelArrows[arrowSpawnIdx].spawnTime<=gameTime){
    const la=levelArrows[arrowSpawnIdx];
    arrows.push({dir:la.dir, y:-30, hit:false, missed:false});
    arrowSpawnIdx++;
  }

  // Move arrows
  arrows.forEach(a=>{
    if(!a.hit && !a.missed) a.y += cfg.speed*dt;
  });

  // Check missed
  arrows.forEach(a=>{
    if(!a.hit && !a.missed && a.y > ARROW_Y_HIT+HIT_WINDOW_GOOD+20){
      a.missed=true;
      lives--; combo=0;
      playSfx('life');
      spawnFeedback('MANCATO!', COL_X[a.dir], ARROW_Y_HIT-20, '#ff3333');
      vikingAnim={move:['fail_trip','fail_fall','fail_axe'][Math.floor(Math.random()*3)],timer:0.6};
      if(lives<=0){ setTimeout(gameOver,600); }
    }
  });

  // Remove dead arrows
  for(let i=arrows.length-1;i>=0;i--){
    if((arrows[i].hit||arrows[i].missed) && arrows[i].y>H+40) arrows.splice(i,1);
  }

  // Check level complete
  if(arrowSpawnIdx>=levelArrows.length && arrows.every(a=>a.hit||a.missed)){
    if(lives>0) setTimeout(levelWin,800);
  }

  // Viking anim timer
  if(vikingAnim.timer>0){ vikingAnim.timer-=dt; if(vikingAnim.timer<=0) vikingAnim.move='idle'; }

  // Bubble timer
  if(bubbleMsg){ bubbleMsg.timer-=dt; if(bubbleMsg.timer<=0) bubbleMsg=null; }

  updateParticles(dt);
  updateFeedback(dt);
}

function drawGame(dt){
  drawBackground(dt);

  // Lane lines
  DIRS.forEach(dir=>{
    ctx.save();
    ctx.strokeStyle=COLORS[dir]; ctx.lineWidth=1; ctx.globalAlpha=.15;
    ctx.beginPath(); ctx.moveTo(COL_X[dir],0); ctx.lineTo(COL_X[dir],H); ctx.stroke();
    ctx.restore();
  });

  // Arrows
  arrows.forEach(a=>{
    if(a.hit){
      drawArrow(COL_X[a.dir],a.y,a.dir,COLORS[a.dir],Math.max(0,.8-a.y/H),1.3+a.y/H*.5);
    } else if(!a.missed){
      drawArrow(COL_X[a.dir],a.y,a.dir,COLORS[a.dir],1,1);
    }
  });

  // Viking
  const vx=W/2, vy=H*.68;
  drawViking(vx, vy, vikingAnim.timer>0?vikingAnim.move:'idle', bgTimer);

  drawParticles();
  drawHUD();
  drawFeedback();
  if(bubbleMsg) drawBubble();
}

// ─────────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────────
function loop(ts){
  const dt=Math.min((ts-lastTime)/1000, .05);
  lastTime=ts;
  ctx.clearRect(0,0,W,H);

  if(state==='title')    { drawTitle(dt); }
  else if(state==='playing'){
    updateGame(dt);
    drawGame(dt);
  }
  else if(state==='levelwin')  { drawLevelWin(dt); }
  else if(state==='gameover')  {
    drawBackground(dt);
    drawGameOver();
  }
  else if(state==='victory')   { drawVictory(dt); }

  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{ lastTime=ts; requestAnimationFrame(loop); });

// ─────────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────────
const KEY_MAP = {
  ArrowLeft:'left', ArrowDown:'down', ArrowUp:'up', ArrowRight:'right',
  a:'left', s:'down', w:'up', d:'right',
};

document.addEventListener('keydown', e=>{
  const dir=KEY_MAP[e.key];
  if(dir){ e.preventDefault(); pressDir(dir); return; }
  if(e.key==='Enter'||e.key===' ') handleAction();
});

canvas.addEventListener('click', e=>{
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
  const cx=(e.clientX-rect.left)*sx, cy=(e.clientY-rect.top)*sy;
  handleClick(cx,cy);
});

['tLeft','tDown','tUp','tRight'].forEach((id,i)=>{
  const dirs=['left','down','up','right'];
  const el=document.getElementById(id);
  if(!el) return;
  el.addEventListener('touchstart',e=>{ e.preventDefault(); initAudio(); pressDir(dirs[i]); },{passive:false});
  el.addEventListener('mousedown',e=>{ e.preventDefault(); initAudio(); pressDir(dirs[i]); });
});

function handleClick(cx,cy){
  initAudio();
  if(state==='title'){
    // Start button area
    if(cx>=W/2-100&&cx<=W/2+100&&cy>=H-180&&cy<=H-128) startLevel(0);
  } else if(state==='levelwin'){
    if(cx>=W/2-100&&cx<=W/2+100&&cy>=H-180&&cy<=H-128) startLevel(level+1);
  } else if(state==='gameover'){
    if(cx>=W/2-100&&cx<=W/2+100&&cy>=H-180&&cy<=H-128) startLevel(level);
  } else if(state==='victory'){
    if(cx>=W/2-100&&cx<=W/2+100&&cy>=H-180&&cy<=H-128){ state='title'; stopBGM(); }
  }
}

function handleAction(){
  initAudio();
  if(state==='title') startLevel(0);
  else if(state==='levelwin') startLevel(level+1);
  else if(state==='gameover') startLevel(level);
  else if(state==='victory'){ state='title'; stopBGM(); }
}

// Touch-to-start
canvas.addEventListener('touchstart',e=>{
  initAudio();
  const touch=e.touches[0];
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
  const cx=(touch.clientX-rect.left)*sx, cy=(touch.clientY-rect.top)*sy;
  handleClick(cx,cy);
},{passive:true});
</script>
